<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flowchart showing the Tasks Extension pattern: server creates a durable task, client polls for state, mid-task input_required is resolved via tasks/update rather than retrying the original call. Two loops are visible: polling-while-working, and resume-after-update.</desc>
